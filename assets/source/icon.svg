<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1a0e00" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="slashGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7d1a"/>
      <stop offset="100%" stop-color="#ffa552"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Backdrop with rounded macOS-style corners (Squircle approximation via rect) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="1012" height="1012" rx="216" ry="216"
        fill="none" stroke="#232323" stroke-width="2"/>

  <!--
    "H/P1" set in a hand-drawn monospace style — every glyph is a path so
    the icon renders identically on any system without needing JetBrains
    Mono installed. Stroke-based to keep it crisp at 16×16.
  -->
  <g stroke="none" font-weight="700">
    <!-- H -->
    <g fill="#efe7d8">
      <rect x="170" y="370" width="48" height="284"/>
      <rect x="288" y="370" width="48" height="284"/>
      <rect x="170" y="490" width="166" height="44"/>
    </g>

    <!-- Slash (the brand mark) — diagonal with orange gradient + glow -->
    <g filter="url(#glow)">
      <path d="M 414 690 L 506 332 L 562 332 L 470 690 Z"
            fill="url(#slashGlow)"/>
    </g>

    <!-- P -->
    <g fill="#efe7d8">
      <rect x="600" y="370" width="48" height="284"/>
      <rect x="600" y="370" width="138" height="44"/>
      <rect x="600" y="496" width="138" height="44"/>
      <rect x="694" y="370" width="44" height="170"/>
    </g>

    <!-- 1 -->
    <g fill="#efe7d8">
      <rect x="816" y="370" width="48" height="284"/>
      <path d="M 760 414 L 816 370 L 816 414 Z"/>
      <rect x="760" y="610" width="160" height="44"/>
    </g>
  </g>

  <!-- Bottom rule echoing the masthead-rule in the app -->
  <rect x="170" y="780" width="64" height="3" fill="#ff7d1a"/>
  <rect x="170" y="780" width="700" height="1" fill="#232323"/>
</svg>
