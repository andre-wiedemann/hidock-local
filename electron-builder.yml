appId: dev.andre.hidock-local
productName: HiDock Local
copyright: Copyright © 2026 André Wiedemann

directories:
  buildResources: assets
  output: release/${version}

files:
  - out/**/*
  - package.json

asarUnpack:
  - resources/**

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.utilities
  icon: assets/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: assets/icon.png

publish: null
