appId: dev.andre.hidock-local
productName: HiDock Local
copyright: Copyright © 2026 André Wiedemann

directories:
  buildResources: assets
  output: release/${version}

files:
  - out/**/*
  - package.json
  # Bundle whisper-cli built by fetch-whisper.mjs. Each runner only
  # populates its own `resources/whisper/<plat-arch>/` so the resulting
  # bundle is naturally platform-scoped.
  - resources/whisper/**/*
  # Production deps that the main process requires at runtime.
  # ffmpeg-static carries its own platform-specific ffmpeg binary; the
  # main bundle externalizes it via electron-vite's externalizeDepsPlugin
  # so it resolves through node_modules at runtime.
  - node_modules/ffmpeg-static/**/*

asarUnpack:
  # Binaries can't execute when packed inside the asar. Unpack everything
  # main-process spawn() targets at runtime: whisper-cli + its model dir,
  # plus ffmpeg-static's bundled ffmpeg binary.
  - resources/**
  - node_modules/ffmpeg-static/**

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.utilities
  icon: assets/icon.icns
  # No Apple Developer cert — explicitly disable signing so electron-builder
  # doesn't try to auto-locate one and fail on the empty CSC_KEY_PASSWORD.
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  # No code-signing cert configured. electron-builder skips Windows signing
  # by default when WIN_CSC_LINK is unset, so SmartScreen warns on first
  # launch but the build itself succeeds.

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: assets/icon.png

publish: null
